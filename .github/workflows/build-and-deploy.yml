name: Build and Deploy

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run-script lint
      - name: Build
        run: npm run-script build
      - name: Copy dependencies
        run: cp package.json build/package.json
      - name: Archive build artifact
        uses: actions/upload-artifact@v3
        with:
          name: build
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v3
        with:
          name: build
      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add known host
        run: echo '${{ secrets.KNOWN_HOST }}' >> ~/.ssh/known_hosts
      - name: Deploy to server
        run: rsync -avz --delete --exclude={.env,node_modules,logs,.db} . ${{secrets.USER}}@${{secrets.HOST}}:/var/www/bot.virtualnas.net
      - name: Install dependencies on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: cd /var/www/bot.virtualnas.net && npm i --omit=dev && systemctl --user restart bot.virtualnas.net.service
      - name: Set succeeded to true
        id: succeeded
        run: echo "succeeded=true" >> "$GITHUB_OUTPUT"
    outputs:
     succeeded: ${{ steps.succeeded.outputs.succeeded }}
     
  send-notifiction:
      needs: deploy
      if: ${{ always() }}
      uses: vatsim-vnas/github-workflows/.github/workflows/send-release-notification.yml@master
      with:
        succeeded: ${{ needs.deploy.outputs.succeeded == 'true' }}
        repository: ${{ github.repository }}
        run-id: ${{ github.run_id }}

